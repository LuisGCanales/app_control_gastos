<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="lite.css" />

  <title>Gastos Lite</title>

</head>


<body>

<!-- DIARIO -->
<main class="container" id="lite">

<h1>Control de Gastos<sup class="supscript">V60.4</sup></h1>

<br>

<div id="diario" class="resumen">
  <div>Hoy</div>

  <div class="numero">
    <span id="dia-gastado" class="gastado">0</span>
    /
    <span id="dia-restante" class="restante">0</span>
  </div>
</div>


<!-- SEMANAL -->

<div id="semanal" class="resumen">
  <div>Semana</div>

  <div class="numero">
    <span id="sem-gastado" class="gastado">0</span>
    /
    <span id="sem-restante" class="restante">0</span>
  </div>
</div>


<!-- FORMULARIO RÁPIDO -->

<form id="gasto-form">

<input
type="number"
inputmode="decimal"
pattern="[0-9]*"
id="monto"
placeholder="Monto"
step="0.01"
required
>

<input
  type="text"
  id="concepto"
  placeholder="Concepto"
  required
>

<select id="medio-pago"></select>

<textarea id="nota-gasto" rows="3" placeholder="Nota (opcional)"></textarea>

<button type="submit">
  Registrar gasto
</button>

</form>

<a href="index.html" class="btn-completa">
  Full version
</a>

<script defer src="lite.js"></script>
</main>
</body>
</html>
